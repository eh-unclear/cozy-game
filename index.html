<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やさしい日常 × 歪む夜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1610;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'MS Gothic', 'ＭＳ ゴシック', 'Courier New', monospace;
    }
    #title {
      color: #c8a464;
      font-size: 12px;
      letter-spacing: 5px;
      margin-bottom: 10px;
    }
    #game-wrapper {
      border: 3px solid #4a3018;
      border-radius: 10px;
      overflow: hidden;
      image-rendering: pixelated;
    }
    #hint {
      color: #4a3828;
      font-size: 10px;
      letter-spacing: 2px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="title">やさしい日常 &times; 歪む夜</div>
  <div id="game-wrapper"></div>
  <div id="hint">[ ↑↓←→ / WASD ] 移動　　[ F / Space ] 調べる</div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
'use strict';

const GW = 640, GH = 480;
const WALL_Y = 155;
const DAY_DURATION = 30000;

// ── カラーパレット (限定色) ───────────────────────────────────────
const D = {                           // 昼
  wall:  0xf2e6d2, wallSh: 0xddd0b8, // 壁: クリーム
  flA:   0xd8a668, flB:    0xc89048, flLn: 0xa07030,  // 床板
  base:  0xbe8840,                    // 幅木
  ol:    0x3a2416,                    // 統一輪郭色
  wdHi:  0xd4a060, wdMd:  0xa87038, wdLo: 0x78501e,  // 家具の木
  soft:  0xf5ead8, softSh: 0xdecaaa, // 枕・シーツ
  blk:   0x9dbf82, blkSh:  0x7a9f62, // 掛け布団 (くすみグリーン)
  sky:   0xaadaf5, sun:    0xf8d060,  // 空・太陽
  curt:  0xd4bce0, curtSh: 0xb89cc8, // カーテン (くすみラベンダー)
  gHi:   0x8ec84a, gMd:   0x62a02a, gLo: 0x427018,   // 植物
  pHi:   0xe07050, pMd:   0xc05030, pLo: 0x9a3820,   // テラコッタ
  rug:   0xdc9276, rugSh:  0xbc7258, rugPt: 0xcc8264,// ラグ
  pic:   0xa8d4f0, picMt:  0xf4ecd8, // 絵 (水色・マット)
};
const N = {                           // 夜
  wall:  0x18142c, wallSh: 0x100e20,
  flA:   0x120e22, flB:    0x0e0a1c, flLn: 0x080618,
  base:  0x18142a,
  ol:    0x08061a,
  wdHi:  0x241c40, wdMd:  0x1a1432, wdLo: 0x100c28,
  soft:  0x2a2248, softSh: 0x1e1836,
  blk:   0x1c2e1a, blkSh:  0x142018,
  sky:   0x060420, sun:    0x0c0836,
  curt:  0x2c2452, curtSh: 0x1e183c,
  gHi:   0x1c3010, gMd:   0x12200a, gLo: 0x0c1806,
  pHi:   0x281408, pMd:   0x1c0e06, pLo: 0x100804,
  rug:   0x1e1020, rugSh:  0x160a18,
  moon:  0xcccee8, star:   0xe8eaf8,
};

// ── 描画ヘルパー ─────────────────────────────────────────────────

// 輪郭付き矩形 + 下辺シャドウ
function box(g, x, y, w, h, fill, shade, olc) {
  g.fillStyle(olc !== undefined ? olc : D.ol);
  g.fillRect(x - 2, y - 2, w + 4, h + 4);
  g.fillStyle(fill);
  g.fillRect(x, y, w, h);
  if (shade !== undefined) {
    g.fillStyle(shade);
    g.fillRect(x, y + h - 4, w, 4);
  }
}

// 輪郭なし矩形 (内部パーツ用)
function fill(g, x, y, w, h, col) {
  g.fillStyle(col);
  g.fillRect(x, y, w, h);
}

// 輪郭付き三角形 (植物・木の葉) bx,by=底辺左, bw=底辺幅, ty=頂点y
function tri(g, bx, by, bw, ty, fillC, shadeC, olc) {
  const cx = Math.round(bx + bw / 2);
  g.fillStyle(olc !== undefined ? olc : D.ol);
  g.fillTriangle(bx - 2, by + 2, bx + bw + 2, by + 2, cx, ty - 2);
  g.fillStyle(fillC);
  g.fillTriangle(bx, by, bx + bw, by, cx, ty);
  // 底辺のシャドウ
  if (shadeC !== undefined) {
    g.fillStyle(shadeC);
    g.fillTriangle(bx, by, bx + bw, by, cx, by - 8);
  }
}

// ─────────────────────────────────────────
//  GameScene
// ─────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }

  create() {
    this.state       = 'day';
    this.anomalyType = null;
    this.playerX     = GW / 2;
    this.playerY     = GH / 2 + 60;
    this.walkTimer   = 0;
    this.walkStep    = 0;

    this.gRoom   = this.add.graphics().setDepth(0);
    this.gObj    = this.add.graphics().setDepth(1);
    this.gPlayer = this.add.graphics().setDepth(3);
    this.nightVeil = this.add.rectangle(GW/2, GH/2, GW, GH, 0x06040e, 0).setDepth(5);

    this.createUI();

    this.cursors = this.input.keyboard.createCursorKeys();
    this.keyW = this.input.keyboard.addKey('W');
    this.keyA = this.input.keyboard.addKey('A');
    this.keyS = this.input.keyboard.addKey('S');
    this.keyD = this.input.keyboard.addKey('D');
    this.keyF = this.input.keyboard.addKey('F');
    this.keySPC = this.input.keyboard.addKey('SPACE');

    this.drawRoom(false);
    this.drawObjects(false, null);
    this.drawPlayer(false, 0);
    this.scheduleDayToNight();

    this.time.addEvent({
      delay: 110, loop: true,
      callback: () => {
        if (this.state === 'night')
          this.nightVeil.setFillStyle(0x06040e, 0.72 + (Math.random() - 0.5) * 0.05);
      }
    });

    this.showMsg('おはようございます。\nいつもの、やさしい朝。', 3500);
  }

  scheduleDayToNight() {
    this.dayTimer = this.time.delayedCall(DAY_DURATION, () => {
      if (this.state === 'day') this.startNight();
    });
  }

  // ─────────────────────────────────────────
  //  部屋
  // ─────────────────────────────────────────
  drawRoom(night) {
    const g = this.gRoom;
    g.clear();
    const p = night ? N : D;

    // ── 床 (2色交互のフロア板) ──
    g.fillStyle(p.flA);
    g.fillRect(0, WALL_Y, GW, GH - WALL_Y);
    g.fillStyle(p.flB);
    for (let i = 0; i < 8; i += 2) {
      g.fillRect(0, WALL_Y + i * 42, GW, 42);
    }
    // 板目地
    g.fillStyle(p.flLn);
    for (let y = WALL_Y + 42; y < GH; y += 42) g.fillRect(0, y, GW, 2);

    // ── 幅木 ──
    g.fillStyle(p.base);
    g.fillRect(0, WALL_Y, GW, 7);
    if (!night) {
      g.fillStyle(0xd4a060);
      g.fillRect(0, WALL_Y, GW, 2);
    }

    // ── 壁 (フラット) ──
    g.fillStyle(p.wall);
    g.fillRect(0, 0, GW, WALL_Y);
    // 壁の下端に薄い影
    g.fillStyle(p.wallSh);
    g.fillRect(0, WALL_Y - 8, GW, 8);

    // ── ラグ ──
    this._rug(g, 178, 268, 296, 150, night);

    // ── 窓 ──
    this._window(g, 228, 12, 164, 128, night);

    // ── 壁飾り (絵) ──
    this._picture(g, 94, 24, night);
  }

  _rug(g, x, y, w, h, night) {
    const p = night ? N : D;
    // 本体
    g.fillStyle(p.rug);
    g.fillRect(x, y, w, h);
    // 内枠
    g.fillStyle(p.rugSh);
    g.fillRect(x, y + h - 8, w, 8);
    g.fillRect(x + w - 6, y, 6, h);
    // シンプルな格子模様
    g.fillStyle(p.rugPt !== undefined ? p.rugPt : p.rugSh);
    for (let gx = x + 18; gx < x + w; gx += 36) g.fillRect(gx, y, 3, h);
    for (let gy = y + 18; gy < y + h; gy += 36) g.fillRect(x, gy, w, 3);
    // 輪郭
    g.fillStyle(p.ol);
    g.fillRect(x - 2, y - 2, w + 4, 2); // top
    g.fillRect(x - 2, y + h, w + 4, 2); // bottom
    g.fillRect(x - 2, y - 2, 2, h + 4); // left
    g.fillRect(x + w, y - 2, 2, h + 4); // right
    // フリンジ (昼のみ)
    if (!night) {
      g.fillStyle(D.rugSh);
      for (let fx = x + 6; fx < x + w; fx += 10) {
        g.fillRect(fx, y - 6, 4, 7);
        g.fillRect(fx, y + h, 4, 7);
      }
    }
  }

  _window(g, wx, wy, ww, wh, night) {
    const p = night ? N : D;
    const olc = p.ol;

    // カーテン (窓の後ろに)
    // 左カーテン
    g.fillStyle(p.curt);
    g.fillRect(wx - 16, wy - 4, 34, wh + 14);
    g.fillStyle(p.curtSh);
    g.fillRect(wx - 16, wy - 4, 8, wh + 14);
    g.fillRect(wx - 16 + 18, wy - 4, 8, wh + 14);
    // 右カーテン
    g.fillRect(wx + ww - 18, wy - 4, 8, wh + 14);
    g.fillStyle(p.curt);
    g.fillRect(wx + ww - 18, wy - 4, 34, wh + 14);
    g.fillStyle(p.curtSh);
    g.fillRect(wx + ww + 8, wy - 4, 8, wh + 14);

    // カーテンレール
    box(g, wx - 20, wy - 10, ww + 40, 8, night ? 0x2a2448 : 0xa07848, undefined, olc);

    // 窓内部
    g.fillStyle(p.sky);
    g.fillRect(wx, wy, ww, wh);

    if (!night) {
      // 太陽
      g.fillStyle(D.sun);
      g.fillCircle(wx + 28, wy + 26, 22);
      g.fillStyle(0xfff0a0);
      g.fillCircle(wx + 28, wy + 26, 14);
      // 雲 (シンプルな四角雲)
      g.fillStyle(0xffffff);
      g.fillRect(wx + 68, wy + 20, 60, 16);
      g.fillRect(wx + 74, wy + 14, 46, 10);
      g.fillRect(wx + 86, wy + 30, 30, 6);
      g.fillStyle(0xe8f4fc);
      g.fillRect(wx + 68, wy + 30, 60, 6);
      // 光の筋 (シンプル)
      g.fillStyle(0xfff8d8, 0.06);
      g.fillTriangle(wx + 20, wy + wh, wx + 80, wy + wh, GW / 2, GH);
    } else {
      // 月 (三日月)
      g.fillStyle(N.moon);
      g.fillCircle(wx + ww - 30, wy + 28, 22);
      g.fillStyle(N.sky);
      g.fillCircle(wx + ww - 22, wy + 22, 18);
      // 星 (シンプルな点)
      g.fillStyle(N.star);
      const stars = [
        [wx+22,wy+14],[wx+66,wy+10],[wx+104,wy+38],
        [wx+44,wy+56],[wx+82,wy+72],[wx+30,wy+86],
      ];
      for (const [sx,sy] of stars) g.fillRect(sx, sy, 3, 3);
    }

    // 窓枠 (太め輪郭)
    const frmC = night ? 0x2a2248 : 0xa07848;
    const frmH = night ? 0x382e5e : 0xc09060;
    g.fillStyle(olc);
    g.fillRect(wx - 4, wy - 4, ww + 8, wh + 8);
    g.fillStyle(frmC);
    // 外枠
    g.fillRect(wx - 2, wy - 2, ww + 4, 7);
    g.fillRect(wx - 2, wy + wh - 5, ww + 4, 7);
    g.fillRect(wx - 2, wy + 5, 7, wh - 10);
    g.fillRect(wx + ww - 5, wy + 5, 7, wh - 10);
    // 十字桟
    g.fillRect(wx + ww/2 - 4, wy, 8, wh);
    g.fillRect(wx, wy + wh/2 - 4, ww, 8);
    // ハイライト
    g.fillStyle(frmH);
    g.fillRect(wx - 2, wy - 2, ww + 4, 2);
    g.fillRect(wx - 2, wy - 2, 2, wh + 4);

    // 窓台
    box(g, wx - 8, wy + wh - 2, ww + 16, 12, frmC, night ? 0x201840 : 0x806030, olc);
  }

  _picture(g, x, y, night) {
    const fw = 62, fh = 74;
    const frameC = night ? 0x2c2448 : 0xa07840;
    const frameH = night ? 0x3a3060 : 0xc89860;
    // フレーム
    box(g, x, y, fw, fh, frameC, undefined, night ? N.ol : D.ol);
    g.fillStyle(frameH);
    g.fillRect(x, y, fw, 2);
    g.fillRect(x, y + 2, 2, fh - 2);
    // マット
    g.fillStyle(night ? 0x201a38 : D.picMt);
    g.fillRect(x + 5, y + 5, fw - 10, fh - 10);
    // 絵 (山と木のシルエット風)
    if (!night) {
      g.fillStyle(D.pic);
      g.fillRect(x + 5, y + 5, fw - 10, fh - 10);
      // 山
      g.fillStyle(0x8898a8);
      g.fillTriangle(x + 12, y + fh - 10, x + 28, y + 22, x + 44, y + fh - 10);
      g.fillStyle(0xa4b0b8);
      g.fillTriangle(x + 28, y + fh - 10, x + 42, y + 30, x + 56, y + fh - 10);
      // 雪
      g.fillStyle(0xf0f4f8);
      g.fillTriangle(x + 24, y + 22, x + 22, y + 34, x + 32, y + 34);
      // 木
      tri(g, x + 8, y + fh - 22, 12, y + fh - 34, 0x486820, 0x2e4c10, 0x283810);
    } else {
      g.fillStyle(0x14102a);
      g.fillRect(x + 5, y + 5, fw - 10, fh - 10);
      g.fillStyle(0x1e1a38, 0.7);
      g.fillTriangle(x + 12, y + fh - 10, x + 28, y + 22, x + 44, y + fh - 10);
    }
  }

  // ─────────────────────────────────────────
  //  家具
  // ─────────────────────────────────────────
  drawObjects(night, anomaly) {
    const g = this.gObj;
    g.clear();
    const t = this.time.now;

    this.hitBed   = { x: 38,  y: WALL_Y + 4,   w: 182, h: 108 };
    this.hitDesk  = { x: 432, y: WALL_Y + 2,   w: 198, h: 108 };
    this.hitPlant = { x: 46,  y: WALL_Y + 134, w: 84,  h: 116 };

    this._bed(g, 38,  WALL_Y + 4,   night, anomaly === 'bed',   t);
    this._deco(g, night);   // 装飾 (三角木など)
    this._desk(g, 432, WALL_Y + 2,  night, anomaly === 'desk',  t);
    this._plant(g, 46, WALL_Y + 134, night, anomaly === 'plant', t);
  }

  _bed(g, x, y, night, anom, t) {
    const p = night ? N : D;
    const ol = p.ol;
    const W = 182, H = 108;

    // ── 頭板 ──
    box(g, x, y, W, 30, p.wdMd, p.wdLo, ol);
    // 頭板のパネル (2分割)
    fill(g, x + 4, y + 4, W/2 - 7, 22, p.wdLo);
    fill(g, x + W/2 + 3, y + 4, W/2 - 7, 22, p.wdLo);
    // ハイライト
    g.fillStyle(p.wdHi);
    g.fillRect(x + 2, y + 2, W - 4, 2);

    // ── 足板 ──
    box(g, x, y + H - 12, W, 12, p.wdMd, p.wdLo, ol);

    // ── シーツ ──
    box(g, x + 3, y + 28, W - 6, 16, p.soft, p.softSh, ol);

    // ── 掛け布団 ──
    const bkC  = anom ? (night ? 0x2c1e48 : 0xb89cd8) : p.blk;
    const bkSh = anom ? (night ? 0x1e1438 : 0x9078b8) : p.blkSh;
    box(g, x + 3, y + 42, W - 6, H - 56, bkC, bkSh, ol);
    // 布団の格子 (シンプルなライン)
    if (!anom || !night) {
      g.fillStyle(night ? 0x24203a : 0xe8f0d8, 0.4);
      for (let lx = x + 20; lx < x + W - 10; lx += 26) g.fillRect(lx, y + 42, 2, H - 56);
      g.fillRect(x + 3, y + 42 + (H - 56)/2, W - 6, 2);
    }

    // ── 枕 ──
    if (anom) {
      // 逆端
      box(g, x + 98, y + 32, 76, 22, night ? 0x504070 : 0xd0b8e8, night ? 0x382c58 : 0xb898c8, ol);
      if (night) {
        // 元の位置の跡
        g.fillStyle(0x2a1e40, 0.5);
        g.fillRect(x + 8, y + 32, 76, 22);
        g.fillStyle(ol);
        g.fillRect(x + 8, y + 32, 76, 2);
        g.fillRect(x + 8, y + 52, 76, 2);
        g.fillRect(x + 8, y + 32, 2, 22);
        g.fillRect(x + 82, y + 32, 2, 22);
      }
      if (night) {
        const a = 0.07 + Math.sin(t / 820) * 0.04;
        g.fillStyle(0x7050c8, a);
        g.fillRect(x - 8, y - 8, W + 16, H + 16);
      }
    } else {
      box(g, x + 8,  y + 32, 70, 22, p.soft, p.softSh, ol);
      box(g, x + 86, y + 32, 88, 22, p.soft, p.softSh, ol);
      // 枕のステッチ
      if (!night) {
        g.fillStyle(0xd8c8a4);
        g.fillRect(x + 38, y + 43, 10, 1);
        g.fillRect(x + 43, y + 38, 1, 10);
        g.fillRect(x + 124, y + 43, 10, 1);
      }
    }

    // ナイトスタンド
    box(g, x + W + 6, y + 20, 48, 60, p.wdMd, p.wdLo, ol);
    fill(g, x + W + 6, y + 20, 48, 8, p.wdHi);  // 天板
    box(g, x + W + 10, y + 36, 40, 16, p.wdLo, undefined, ol);  // 引き出し
    // ノブ
    g.fillStyle(night ? 0x484070 : 0xd4a850);
    g.fillCircle(x + W + 30, y + 44, 4);
    // ナイトスタンドの上: お茶カップ
    if (!night) {
      g.fillStyle(D.ol);
      g.fillRect(x + W + 12, y + 10, 26, 2);
      g.fillStyle(0xf4ecd8);
      g.fillRect(x + W + 13, y + 4, 14, 10);
      g.fillStyle(0xffe8b0);
      g.fillRect(x + W + 13, y + 4, 14, 3);
    }
  }

  _deco(g, night) {
    // 装飾の三角木 (窓そばに2本)
    this._triTree(g, 148, WALL_Y + 20, night, false);
    this._triTree(g, 192, WALL_Y + 28, night, true);  // 少し小さく

    // 壁時計
    this._clock(g, GW - 82, 54, night);
  }

  _triTree(g, cx, by, night, small) {
    const p = night ? N : D;
    const scale = small ? 0.8 : 1.0;
    const lw1 = Math.round(52 * scale), lh1 = Math.round(36 * scale);
    const lw2 = Math.round(42 * scale), lh2 = Math.round(32 * scale);
    const lw3 = Math.round(30 * scale), lh3 = Math.round(28 * scale);

    // 幹
    const trunkH = Math.round(18 * scale);
    box(g, cx - 5, by, 10, trunkH, p.wdMd, p.wdLo, p.ol);

    // 葉 (下から上へ、3層の三角形)
    const leaf1Y = by - lh1;
    const leaf2Y = by - lh1 - lh2 + 10;
    const leaf3Y = by - lh1 - lh2 - lh3 + 20;

    tri(g, cx - lw1/2, by,     lw1, leaf1Y, p.gMd, p.gLo, p.ol);
    tri(g, cx - lw2/2, by - lh1 + 10, lw2, leaf2Y, p.gHi, p.gMd, p.ol);
    tri(g, cx - lw3/2, by - lh1 - lh2 + 20, lw3, leaf3Y, p.gHi, p.gMd, p.ol);

    // 鉢 (シンプルな台形っぽく)
    box(g, cx - 14, by, 28, 20, p.pMd, p.pLo, p.ol);
    fill(g, cx - 16, by, 32, 7, p.pHi);  // リム
    g.fillStyle(p.ol);
    g.fillRect(cx - 16, by, 32, 2);
  }

  _clock(g, cx, cy, night) {
    const p = night ? N : D;
    box(g, cx - 22, cy - 22, 44, 44, night ? 0x201a38 : 0xf4eed8, undefined, p.ol);
    // 文字盤の丸み (四角時計)
    g.fillStyle(night ? 0x282040 : 0xf4eed8);
    g.fillCircle(cx, cy, 20);
    // 目盛り
    g.fillStyle(night ? 0x484070 : 0xa09050);
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
      g.fillRect(cx + Math.cos(a) * 16 - 1, cy + Math.sin(a) * 16 - 1, 2, 2);
    }
    g.lineStyle(2, night ? 0x6060a0 : 0x605040);
    g.lineBetween(cx, cy, cx - 8, cy - 11);
    g.lineBetween(cx, cy, cx + 3, cy - 14);
    g.fillStyle(night ? 0x8080b8 : 0x807850);
    g.fillCircle(cx, cy, 2);
  }

  _desk(g, x, y, night, anom, t) {
    const p = night ? N : D;
    const ol = p.ol;
    const W = 148, H = 98;

    // 脚
    box(g, x + 8,       y + 16, 12, H - 16, p.wdLo, undefined, ol);
    box(g, x + W - 20,  y + 16, 12, H - 16, p.wdLo, undefined, ol);

    // 天板
    box(g, x, y, W, 18, p.wdMd, p.wdLo, ol);
    fill(g, x, y, W, 3, p.wdHi);  // ハイライト

    // ── 机の上: 本 ──
    if (anom) {
      // 開かれた本
      const bW = 88, bH = 18;
      box(g, x + 14, y - bH, bW, bH, night ? 0x362858 : 0xd0b8e8, night ? 0x241c48 : 0xb098d0, ol);
      // ページ分割
      fill(g, x + 14 + bW/2 - 2, y - bH, 4, bH, night ? 0x241a44 : 0x9878c0);
      // 文字ライン
      g.fillStyle(night ? 0x504080 : 0x9080b0, 0.7);
      for (let i = 0; i < 3; i++) {
        g.fillRect(x + 20, y - bH + 4 + i * 5, 36, 1);
        g.fillRect(x + 14 + bW/2 + 6, y - bH + 4 + i * 5, 36, 1);
      }
      if (night) {
        const a = 0.07 + Math.sin(t / 900) * 0.04;
        g.fillStyle(0x5048c8, a);
        g.fillRect(x - 8, y - 30, W + 16, H + 40);
      }
    } else {
      // 閉じた本
      box(g, x + 14, y - 18, 40, 16, night ? 0x28204a : 0x9878c8, night ? 0x1e1638 : 0x7858a8, ol);
    }

    // 鉛筆立て
    box(g, x + W - 32, y - 22, 20, 22, night ? 0x282050 : 0x8898c8, night ? 0x1e1840 : 0x6878a8, ol);
    // 鉛筆 2本
    g.fillStyle(night ? 0x3a3060 : 0xf0c840);
    g.fillRect(x + W - 28, y - 34, 4, 14);
    g.fillStyle(night ? 0x2a2850 : 0xd04040);
    g.fillRect(x + W - 21, y - 36, 4, 16);
    g.fillStyle(night ? 0x32285a : 0x48a040);
    g.fillRect(x + W - 14, y - 30, 4, 12);

    // ランプ (シンプル)
    g.fillStyle(ol);
    g.fillRect(x + 78, y - 36, 6, 36); // ポール (輪郭)
    g.fillStyle(night ? 0x201838 : 0xb0a898);
    g.fillRect(x + 80, y - 35, 4, 34);
    // シェード
    box(g, x + 64, y - 50, 34, 16, night ? 0x2c2250 : 0xe8c050, night ? 0x1c1640 : 0xb89030, ol);
    if (!night) {
      g.fillStyle(0xfff8a0, 0.15);
      g.fillCircle(x + 81, y - 30, 38);
    }
  }

  _plant(g, x, y, night, anom, t) {
    const p = night ? N : D;
    const ol = p.ol;

    // 皿
    box(g, x + 6, y + 86, 52, 6, night ? 0x261c14 : 0xe0caa8, undefined, ol);

    // 鉢
    box(g, x + 10, y + 60, 44, 28, p.pMd, p.pLo, ol);
    fill(g, x + 8, y + 60, 48, 8, p.pHi);  // リム
    g.fillStyle(ol);
    g.fillRect(x + 8, y + 60, 48, 2);
    // 帯模様
    fill(g, x + 10, y + 76, 44, 4, p.pLo);

    // 土
    g.fillStyle(night ? 0x160e08 : 0x5a3818);
    g.fillRect(x + 12, y + 60, 40, 10);

    // 葉 (三角形積み上げ スタイル)
    if (anom) {
      // 異常: 全部こちら向き (少し違うシルエット)
      tri(g, x - 4, y + 54, 72, y + 18, p.gMd, p.gLo, ol);
      tri(g, x + 4, y + 32, 52, y - 2,  p.gHi, p.gMd, ol);
      if (night) {
        const a = 0.09 + Math.sin(t / 760) * 0.05;
        g.fillStyle(0x20601a, a);
        g.fillCircle(x + 32, y + 36, 62);
      }
    } else {
      // 通常: 整った三角ツリー型
      tri(g, x - 2, y + 54, 68, y + 20, p.gMd, p.gLo, ol);
      tri(g, x + 5, y + 34, 52, y + 4,  p.gHi, p.gMd, ol);
      tri(g, x + 13, y + 16, 36, y - 10, p.gHi, p.gMd, ol);
    }
  }

  // ─────────────────────────────────────────
  //  キャラクター (ゆるいちびキャラ)
  // ─────────────────────────────────────────
  drawPlayer(night, step) {
    const g = this.gPlayer;
    g.clear();
    const px = Math.round(this.playerX);
    const py = Math.round(this.playerY);
    const p  = night ? N : D;

    const skin  = night ? 0xd0a880 : 0xf2c89a;
    const skSh  = night ? 0xb08860 : 0xd8a878;
    const hair  = night ? 0x2e2018 : 0x422e1a;
    const shirt = night ? 0x3a4860 : 0x70a0c8;
    const shSh  = night ? 0x283448 : 0x5080a8;
    const pants = night ? 0x283040 : 0x506080;
    const shoe  = night ? 0x14121c : 0x2c2020;
    const cheek = 0xf0a088;
    const ol    = p.ol;

    // 影
    g.fillStyle(0x000000, 0.1);
    g.fillEllipse(px, py + 20, 36, 10);

    // ── 脚 ──
    const ls = step ? 3 : 0, rs = step ? 0 : 3;
    g.fillStyle(ol);
    g.fillRect(px - 11, py + 4 + ls - 1, 11, 15);
    g.fillRect(px + 1,  py + 4 + rs - 1, 11, 15);
    g.fillStyle(pants);
    g.fillRect(px - 10, py + 4 + ls, 10, 13);
    g.fillRect(px + 2,  py + 4 + rs, 10, 13);

    // 靴
    g.fillStyle(ol);
    g.fillRect(px - 13 + (step?2:0), py + 17, 13, 6);
    g.fillRect(px + 1  + (step?0:2), py + 17, 13, 6);
    g.fillStyle(shoe);
    g.fillRect(px - 12 + (step?2:0), py + 18, 12, 4);
    g.fillRect(px + 2  + (step?0:2), py + 18, 12, 4);

    // ── 胴体 ──
    g.fillStyle(ol);
    g.fillRect(px - 13, py - 10, 27, 16);
    g.fillStyle(shirt);
    g.fillRect(px - 12, py - 9, 25, 14);
    g.fillStyle(shSh);
    g.fillRect(px - 12, py + 3, 25, 2);

    // 腕
    const sw = step ? 3 : -3;
    g.fillStyle(ol);
    g.fillRect(px - 19, py - 8 + sw, 9, 14);
    g.fillRect(px + 11, py - 8 - sw, 9, 14);
    g.fillStyle(shirt);
    g.fillRect(px - 18, py - 7 + sw, 7, 12);
    g.fillRect(px + 12, py - 7 - sw, 7, 12);
    // 手
    g.fillStyle(ol);
    g.fillRect(px - 19, py + 5 + sw, 9, 6);
    g.fillRect(px + 11, py + 5 - sw, 9, 6);
    g.fillStyle(skin);
    g.fillRect(px - 18, py + 6 + sw, 7, 4);
    g.fillRect(px + 12, py + 6 - sw, 7, 4);

    // ── 頭 (大きめ丸) ──
    g.fillStyle(ol);
    g.fillRect(px - 13, py - 28, 27, 20);
    g.fillRect(px - 14, py - 26, 29, 16);  // 横に広げて丸っぽく
    g.fillRect(px - 12, py - 29, 25, 2);   // 上端
    g.fillStyle(skin);
    g.fillRect(px - 12, py - 27, 25, 18);
    g.fillRect(px - 13, py - 25, 27, 14);
    g.fillRect(px - 11, py - 28, 23, 2);
    // 影
    g.fillStyle(skSh);
    g.fillRect(px + 10, py - 27, 2, 18);
    g.fillRect(px - 12, py - 10, 25, 2);

    // ── 髪 ──
    g.fillStyle(ol);
    g.fillRect(px - 13, py - 30, 27, 10);
    g.fillRect(px - 14, py - 28, 29, 6);
    g.fillRect(px - 14, py - 24, 5, 16);   // 横髪
    g.fillRect(px + 10, py - 24, 5, 10);
    g.fillStyle(hair);
    g.fillRect(px - 12, py - 29, 25, 9);
    g.fillRect(px - 13, py - 25, 4, 14);
    g.fillRect(px + 10, py - 25, 4, 8);

    // ── 目 (大きめ2ドット) ──
    g.fillStyle(ol);
    g.fillRect(px - 8, py - 18, 4, 5);
    g.fillRect(px + 4, py - 18, 4, 5);
    // ハイライト
    g.fillStyle(0xffffff);
    g.fillRect(px - 8, py - 18, 2, 2);
    g.fillRect(px + 4, py - 18, 2, 2);

    // ── 頬 ──
    g.fillStyle(cheek, night ? 0.25 : 0.5);
    g.fillRect(px - 11, py - 13, 4, 3);
    g.fillRect(px + 7,  py - 13, 4, 3);

    // ── 口 ──
    if (!night) {
      g.fillStyle(0xd48878);
      g.fillRect(px - 2, py - 10, 5, 2);
      g.fillRect(px - 3, py - 11, 2, 1);
      g.fillRect(px + 2, py - 11, 2, 1);
    }
  }

  // ─────────────────────────────────────────
  //  UI (世界観に合わせたシンプルデザイン)
  // ─────────────────────────────────────────
  createUI() {
    const DEP = 10;

    this.uiTime = this.add.text(GW - 14, 10, '☀  昼間', {
      fontFamily: "'MS Gothic','Courier New',monospace",
      fontSize: '13px', color: '#c8a050',
    }).setOrigin(1, 0).setDepth(DEP);

    this.uiMsgBg = this.add.graphics().setDepth(DEP);

    this.uiMsgText = this.add.text(GW/2, GH - 72, '', {
      fontFamily: "'MS Gothic','Courier New',monospace",
      fontSize: '13px', color: '#f5ead6',
      align: 'center', wordWrap: { width: GW - 90 }, lineSpacing: 8,
    }).setOrigin(0.5, 0.5).setDepth(DEP);

    this.uiPrompt = this.add.text(GW/2, GH - 155, '[ F ]  調べる', {
      fontFamily: "'MS Gothic','Courier New',monospace",
      fontSize: '12px', color: '#b4a0d8',
    }).setOrigin(0.5, 0.5).setDepth(DEP).setVisible(false);

    this.uiDots = this.add.text(12, GH - 18, '', {
      fontFamily: 'monospace', fontSize: '11px', color: '#8a6838',
    }).setDepth(DEP);
  }

  showMsg(text, duration = 0, callback = null) {
    const g = this.uiMsgBg;
    g.clear();
    // 枠
    g.fillStyle(0x3a2416);
    g.fillRoundedRect(12, GH - 126, GW - 24, 112, 10);
    g.fillStyle(0x1a130c, 0.92);
    g.fillRoundedRect(14, GH - 124, GW - 28, 108, 9);
    // 上のアクセント線
    g.fillStyle(0xa07030);
    g.fillRect(14, GH - 124, GW - 28, 2);
    this.uiMsgText.setText(text);
    if (duration > 0) {
      this.time.delayedCall(duration, () => { this.hideMsg(); if (callback) callback(); });
    }
  }

  hideMsg() {
    this.uiMsgBg.clear();
    this.uiMsgText.setText('');
  }

  // ─────────────────────────────────────────
  //  ゲームフロー
  // ─────────────────────────────────────────
  startNight() {
    if (this.state !== 'day') return;
    this.state = 'transitioning';
    const picks = ['bed', 'desk', 'plant'];
    this.anomalyType = picks[Phaser.Math.Between(0, 2)];

    this.tweens.add({
      targets: this.nightVeil, fillAlpha: 0.74, duration: 4500, ease: 'Sine.easeInOut',
      onComplete: () => {
        this.drawRoom(true);
        this.drawObjects(true, this.anomalyType);
        this.drawPlayer(true, 0);
        this.state = 'night';
        this.uiTime.setText('☾  夜').setColor('#9090c8');
        this.uiDots.setText('');
        this.showMsg('夜が来た。\n\n部屋のどこかが、おかしい。', 4000);
      }
    });
  }

  triggerEvent() {
    if (this.state !== 'night') return;
    this.state = 'event';
    this.uiPrompt.setVisible(false);

    const msgs = {
      bed:   '枕が、逆を向いていた。\n\nそんなはずはない。\n今朝、自分で直したのに。\n\n誰が、いじったのだろう。',
      desk:  '本が、開いていた。\n\n読んだ覚えはない。\nでも、そのページには\n見覚えのある筆跡があった。',
      plant: '植物が、こちらを向いていた。\n\n植物は動かない。\nそれなのに、\n確かに向きが変わっていた。',
    };

    this.showMsg(msgs[this.anomalyType]);
    this.time.delayedCall(6000, () => {
      this.hideMsg();
      this.time.delayedCall(1200, () => this.startMorning());
    });
  }

  startMorning() {
    this.state = 'morning';
    this.uiPrompt.setVisible(false);
    const veil = this.add.rectangle(GW/2, GH/2, GW, GH, 0xfff4e8, 0).setDepth(20);
    this.tweens.add({
      targets: veil, fillAlpha: 1, duration: 2200, ease: 'Sine.easeIn',
      onComplete: () => {
        this.nightVeil.setFillStyle(0x06040e, 0);
        this.anomalyType = null;
        this.drawRoom(false);
        this.drawObjects(false, null);
        this.drawPlayer(false, 0);
        this.uiTime.setText('☀  昼間').setColor('#c8a050');
        this.tweens.add({
          targets: veil, fillAlpha: 0, duration: 2200, ease: 'Sine.easeOut',
          onComplete: () => {
            veil.destroy();
            this.state = 'day';
            this.showMsg('朝になった。\n\nまた、いつもの日常。', 3500);
            this.scheduleDayToNight();
          }
        });
      }
    });
  }

  distTo(b) {
    return Phaser.Math.Distance.Between(this.playerX, this.playerY, b.x + b.w/2, b.y + b.h/2);
  }

  isNearAnomaly() {
    if (this.state !== 'night' || !this.anomalyType) return false;
    const m = { bed: this.hitBed, desk: this.hitDesk, plant: this.hitPlant };
    return this.distTo(m[this.anomalyType]) < 92;
  }

  // ─────────────────────────────────────────
  //  更新
  // ─────────────────────────────────────────
  update(time, delta) {
    if (this.state === 'event' || this.state === 'morning' || this.state === 'transitioning') return;

    const dt = delta / 1000;
    const isNight = this.state === 'night';
    const up    = this.cursors.up.isDown    || this.keyW.isDown;
    const dn    = this.cursors.down.isDown  || this.keyS.isDown;
    const lf    = this.cursors.left.isDown  || this.keyA.isDown;
    const rt    = this.cursors.right.isDown || this.keyD.isDown;
    const moving = up || dn || lf || rt;

    const spd = isNight ? 108 : 128;
    if (up) this.playerY -= spd * dt;
    if (dn) this.playerY += spd * dt;
    if (lf) this.playerX -= spd * dt;
    if (rt) this.playerX += spd * dt;

    this.playerX = Phaser.Math.Clamp(this.playerX, 18, GW - 18);
    this.playerY = Phaser.Math.Clamp(this.playerY, WALL_Y + 22, GH - 18);

    if (moving) {
      this.walkTimer += delta;
      if (this.walkTimer > 220) { this.walkStep = 1 - this.walkStep; this.walkTimer = 0; }
    } else { this.walkStep = 0; this.walkTimer = 0; }

    this.drawPlayer(isNight, this.walkStep);

    if (isNight && this.anomalyType) {
      if (!this._objAt || time - this._objAt > 200) {
        this.drawObjects(true, this.anomalyType);
        this._objAt = time;
      }
    }

    const near = this.isNearAnomaly();
    this.uiPrompt.setVisible(near);
    if (near) this.uiPrompt.setAlpha(0.5 + Math.sin(time / 380) * 0.5);

    if (near && (Phaser.Input.Keyboard.JustDown(this.keyF) || Phaser.Input.Keyboard.JustDown(this.keySPC))) {
      this.triggerEvent();
    }

    if (this.state === 'day' && this.dayTimer && !this.dayTimer.hasDispatched) {
      const n = Math.floor((1 - this.dayTimer.getRemaining() / DAY_DURATION) * 22);
      this.uiDots.setText('·'.repeat(Math.max(0, n)));
    }
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: GW, height: GH,
  parent: 'game-wrapper',
  backgroundColor: '#e8e0cc',
  pixelArt: true,
  scene: GameScene,
});
  </script>
